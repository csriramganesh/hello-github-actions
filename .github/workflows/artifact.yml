name: artifact-demo

on:
  workflow_dispatch:
    
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: create-report
        run: echo "hello from build job" > report.txt

      - name: Show file
        run: cat report.txt

      - name: upload artifact
        run: actions/upload-artifact@v4
        with:
          name: build-report
          path: report.txt
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: download-artifact
        uses: actions/download-artifact@v4
        with: 
          name: build-report

      - name: read-report
        run: cat report.txt      

           
