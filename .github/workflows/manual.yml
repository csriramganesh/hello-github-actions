name: basic ci cd pipeline

on:
  workflow_dispatch
    inputs:
      environment:
        description: "choose environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - run: echo "building app"

  test:
    runs-on: ubuntu-latest
    needs: build  
    steps:
      - run: echo " tested"
  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: ${{inputs.environment == "prod"}}  
    steps:
      - run: echo " build"    
